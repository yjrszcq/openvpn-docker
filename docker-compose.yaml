x-openvpn-data: &openvpn-data
  volumes:
    - ./openvpn-data:/etc/openvpn
    - ./openvpn-config:/etc/ovpn-conf

services:
  openvpn:
    image: ${OVPN_IMAGE:-szcq/openvpn:2.7.5}
    container_name: openvpn
    restart: unless-stopped
    network_mode: host
    environment:
      OVPN_BOOTSTRAP_FROM_ENV: "${OVPN_BOOTSTRAP_FROM_ENV:-false}"
      OVPN_BOOTSTRAP_ENDPOINT: "${OVPN_BOOTSTRAP_ENDPOINT:-}"
      OVPN_BOOTSTRAP_PROTOCOL: "${OVPN_BOOTSTRAP_PROTOCOL:-}"
      OVPN_BOOTSTRAP_FAMILY: "${OVPN_BOOTSTRAP_FAMILY:-}"
      OVPN_BOOTSTRAP_PORT: "${OVPN_BOOTSTRAP_PORT:-}"
      OVPN_BOOTSTRAP_CLIENT_TO_CLIENT: "${OVPN_BOOTSTRAP_CLIENT_TO_CLIENT:-}"
      OVPN_BOOTSTRAP_IPV4_NETWORK: "${OVPN_BOOTSTRAP_IPV4_NETWORK:-}"
      OVPN_BOOTSTRAP_DYNAMIC_POOL_SIZE: "${OVPN_BOOTSTRAP_DYNAMIC_POOL_SIZE:-}"
      OVPN_BOOTSTRAP_NAT_ENABLED: "${OVPN_BOOTSTRAP_NAT_ENABLED:-}"
      OVPN_BOOTSTRAP_NAT_INTERFACE: "${OVPN_BOOTSTRAP_NAT_INTERFACE:-}"
      OVPN_BOOTSTRAP_REDIRECT_GATEWAY: "${OVPN_BOOTSTRAP_REDIRECT_GATEWAY:-}"
      OVPN_BOOTSTRAP_DNS: "${OVPN_BOOTSTRAP_DNS:-}"
      OVPN_BOOTSTRAP_ROUTES: "${OVPN_BOOTSTRAP_ROUTES:-}"
      OVPN_BOOTSTRAP_LOG_MAX_BYTES: "${OVPN_BOOTSTRAP_LOG_MAX_BYTES:-}"
      OVPN_BOOTSTRAP_LOG_BACKUPS: "${OVPN_BOOTSTRAP_LOG_BACKUPS:-}"
    <<: *openvpn-data
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

  openvpn-maintenance:
    image: ${OVPN_IMAGE:-szcq/openvpn:2.7.5}
    restart: "no"
    network_mode: host
    environment:
      OVPN_MAINTENANCE: "true"
    <<: *openvpn-data
    profiles:
      - maintenance
    command:
      - state
      - doctor
    entrypoint:
      - /usr/local/bin/ovpn
