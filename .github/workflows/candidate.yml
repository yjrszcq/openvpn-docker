name: Candidate

on:
  push:
    branches:
      - main
    paths:
      - versions.env
  workflow_dispatch:
    inputs:
      skip-test:
        description: 'Skip the Test gate (use only after Test has passed)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  policy:
    name: Classify target runtime
    runs-on: ubuntu-latest
    outputs:
      in_range: ${{ steps.policy.outputs.in_range }}
      decision: ${{ steps.policy.outputs.decision }}
      image_required: ${{ steps.policy.outputs.image_required }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: policy
        name: Evaluate branch and candidate range
        run: |
          set -a
          . ./versions.env
          set +a
          scripts/verify-release-metadata.sh > release-metadata.env
          cat release-metadata.env >> "$GITHUB_STEP_SUMMARY"
          previous="$(git show HEAD^:versions.env 2>/dev/null | awk -F= '$1 == "OPENVPN_VERSION" {print $2}' || true)"
          [ -n "$previous" ] || previous="$OPENVPN_VERSION"
          previous_image="$(git show HEAD^:versions.env 2>/dev/null | awk -F= '$1 == "IMAGE_VERSION" {print $2}' || true)"
          if [ "$GITHUB_EVENT_NAME" != workflow_dispatch ] && [ -n "$previous_image" ] && [ "$previous_image" = "$IMAGE_VERSION" ]; then
            echo 'image_required=false' >> "$GITHUB_OUTPUT"
          else
            echo 'image_required=true' >> "$GITHUB_OUTPUT"
          fi
          scripts/release-policy.sh \
            --previous-version "$previous" \
            --target-version "$OPENVPN_VERSION" \
            --candidate-range "$OPENVPN_CANDIDATE_RANGE" \
            --image-version "$IMAGE_VERSION" \
            --github-output "$GITHUB_OUTPUT" > candidate-policy.env
          cat candidate-policy.env >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: Run candidate-range compatibility gate
    needs: policy
    if: >-
      needs.policy.outputs.in_range == 'true' &&
      needs.policy.outputs.image_required == 'true' &&
      inputs.skip-test != true
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  candidate:
    name: Publish candidate image
    needs:
      - policy
      - verify
    if: >-
      always() &&
      needs.policy.outputs.image_required == 'true' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      (needs.policy.outputs.in_range == 'false' || needs.verify.result == 'success' || needs.verify.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Authenticate to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Build and publish multi-architecture candidate
        run: |
          set -a
          . ./versions.env
          set +a
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "BASE_IMAGE=$BASE_IMAGE" \
            --build-arg "GO_BUILD_IMAGE=$GO_BUILD_IMAGE" \
            --build-arg "GO_RUNTIME_VERSION=$GO_RUNTIME_VERSION" \
            --build-arg "IMAGE_VERSION=$IMAGE_VERSION" \
            --build-arg "DATA_SCHEMA=$DATA_SCHEMA" \
            --build-arg "OPENVPN_VERSION=$OPENVPN_VERSION" \
            --build-arg "OPENVPN_SOURCE_SHA256=$OPENVPN_SOURCE_SHA256" \
            --build-arg "EASYRSA_VERSION=$EASYRSA_VERSION" \
            --build-arg "OPENVPN_CANDIDATE_RANGE=$OPENVPN_CANDIDATE_RANGE" \
            --build-arg "VCS_REF=$GITHUB_SHA" \
            --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "org.opencontainers.image.source=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            --label "org.opencontainers.image.version=$IMAGE_VERSION" \
            --label "org.opencontainers.image.licenses=GPL-2.0-only" \
            --tag "$image:candidate-$IMAGE_VERSION" \
            --push \
            .
          mkdir -p artifacts
          previous="$(git show HEAD^:versions.env 2>/dev/null | awk -F= '$1 == "OPENVPN_VERSION" {print $2}' || true)"
          [ -n "$previous" ] || previous="$OPENVPN_VERSION"
          scripts/release-policy.sh \
            --previous-version "$previous" \
            --target-version "$OPENVPN_VERSION" \
            --candidate-range "$OPENVPN_CANDIDATE_RANGE" \
            --image-version "$IMAGE_VERSION" > artifacts/release-policy.env
          scripts/verify-release-metadata.sh > artifacts/release-metadata.env
          printf 'candidate=%s:candidate-%s\npolicy=%s\n' "$image" "$IMAGE_VERSION" "${{ needs.policy.outputs.decision }}" > artifacts/candidate-summary.txt
      - name: Upload candidate report
        uses: actions/upload-artifact@v4
        with:
          name: candidate-${{ github.sha }}
          path: artifacts
