name: Candidate

on:
  push:
    paths:
      - versions.env
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  policy:
    name: Classify target runtime
    runs-on: ubuntu-latest
    outputs:
      in_range: ${{ steps.policy.outputs.in_range }}
      decision: ${{ steps.policy.outputs.decision }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: policy
        name: Evaluate branch and supported range
        run: |
          set -a
          . ./versions.env
          set +a
          previous="$(git show HEAD^:versions.env 2>/dev/null | awk -F= '$1 == "OPENVPN_VERSION" {print $2}' || true)"
          [ -n "$previous" ] || previous="$OPENVPN_VERSION"
          scripts/release-policy.sh \
            --previous-version "$previous" \
            --target-version "$OPENVPN_VERSION" \
            --supported-range "$OPENVPN_SUPPORTED_RANGE" \
            --image-version "$IMAGE_VERSION" \
            --github-output "$GITHUB_OUTPUT" > candidate-policy.env
          cat candidate-policy.env >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: Run supported-range compatibility gate
    needs: policy
    if: needs.policy.outputs.in_range == 'true'
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  candidate:
    name: Publish candidate image
    needs:
      - policy
      - verify
    if: >-
      always() &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      (needs.policy.outputs.in_range == 'false' || needs.verify.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Authenticate to GitHub Container Registry
        run: printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Build and publish multi-architecture candidate
        run: |
          set -a
          . ./versions.env
          set +a
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "BASE_IMAGE=$BASE_IMAGE" \
            --build-arg "IMAGE_VERSION=$IMAGE_VERSION" \
            --build-arg "OPENVPN_VERSION=$OPENVPN_VERSION" \
            --build-arg "OPENVPN_SOURCE_SHA256=$OPENVPN_SOURCE_SHA256" \
            --build-arg "EASYRSA_VERSION=$EASYRSA_VERSION" \
            --build-arg "OPENVPN_SUPPORTED_RANGE=$OPENVPN_SUPPORTED_RANGE" \
            --build-arg "VCS_REF=$GITHUB_SHA" \
            --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "org.opencontainers.image.source=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            --tag "$image:candidate-ovpn$OPENVPN_VERSION" \
            --push \
            .
          mkdir -p artifacts
          previous="$(git show HEAD^:versions.env 2>/dev/null | awk -F= '$1 == "OPENVPN_VERSION" {print $2}' || true)"
          [ -n "$previous" ] || previous="$OPENVPN_VERSION"
          scripts/release-policy.sh \
            --previous-version "$previous" \
            --target-version "$OPENVPN_VERSION" \
            --supported-range "$OPENVPN_SUPPORTED_RANGE" \
            --image-version "$IMAGE_VERSION" > artifacts/release-policy.env
          printf 'candidate=%s:candidate-ovpn%s\npolicy=%s\n' "$image" "$OPENVPN_VERSION" "${{ needs.policy.outputs.decision }}" > artifacts/candidate-summary.txt
      - name: Upload candidate report
        uses: actions/upload-artifact@v4
        with:
          name: candidate-${{ github.sha }}
          path: artifacts
