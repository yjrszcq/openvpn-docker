name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static, control plane, and policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint workflow and Milestone 10 tooling
        run: |
          docker run --rm -v "$PWD:/work:ro" -w /work rhysd/actionlint:1.7.7
          docker run --rm -v "$PWD:/work:ro" -w /work koalaman/shellcheck:v0.10.0 -e SC1091 \
            scripts/update-openvpn.sh \
            scripts/release-policy.sh \
            scripts/package-management-release.sh \
            scripts/verify-management-release.sh \
            rootfs/usr/local/lib/openvpn-bootstrap.sh \
            rootfs/usr/local/bin/ovpn-hook \
            rootfs/usr/local/lib/openvpn-verify-management-release.sh \
            rootfs/usr/local/lib/openvpn-container/maintenance.sh \
            rootfs/usr/local/lib/openvpn-container/render-ipam.sh \
            rootfs/usr/local/lib/openvpn-container/render.sh \
            rootfs/usr/local/lib/openvpn-container/start.sh \
            rootfs/usr/local/lib/openvpn-container/upgrade.sh \
            rootfs/usr/local/lib/openvpn-container/events.sh \
            tests/smoke/container/e2e-container-smoke.sh \
            tests/smoke/container/runtime-image-smoke.sh \
            tests/smoke/shell/init-start-smoke.sh \
            tests/smoke/shell/management-broker-smoke.sh \
            tests/smoke/shell/update-openvpn-smoke.sh \
            tests/smoke/shell/release-policy-smoke.sh \
            tests/smoke/shell/management-release-smoke.sh \
            tests/smoke/shell/management-upgrade-smoke.sh \
            tests/smoke/shell/management-hook-smoke.sh \
            tests/smoke/shell/network-migration-smoke.sh \
            tests/smoke/shell/render-smoke.sh \
            tests/smoke/shell/runtime-logs-smoke.sh \
            tests/smoke/shell/runtime-events-smoke.sh \
            tests/smoke/shell/schema2-uuid-migration-smoke.sh \
            tests/smoke/shell/uuid-registry-smoke.sh \
            tests/helpers/create-management-release-fixture.sh \
            tests/helpers/fake-release-curl.sh \
            tests/smoke/container/upgrade-state-smoke.sh \
            tests/smoke/shell/workflow-smoke.sh \
            tests/smoke/shell/license-smoke.sh
          docker run --rm -v "$PWD:/work:ro" -w /work mvdan/shfmt:v3.10.0 -i 2 -d scripts/update-openvpn.sh scripts/release-policy.sh scripts/package-management-release.sh scripts/verify-management-release.sh rootfs/usr/local/bin/ovpn-hook rootfs/usr/local/lib/openvpn-bootstrap.sh rootfs/usr/local/lib/openvpn-verify-management-release.sh rootfs/usr/local/lib/openvpn-container/maintenance.sh rootfs/usr/local/lib/openvpn-container/render-ipam.sh rootfs/usr/local/lib/openvpn-container/render.sh rootfs/usr/local/lib/openvpn-container/start.sh rootfs/usr/local/lib/openvpn-container/upgrade.sh rootfs/usr/local/lib/openvpn-container/events.sh tests/helpers/create-management-release-fixture.sh tests/helpers/fake-release-curl.sh tests/smoke/container/e2e-container-smoke.sh tests/smoke/container/runtime-image-smoke.sh tests/smoke/shell/init-start-smoke.sh tests/smoke/shell/management-broker-smoke.sh tests/smoke/shell/update-openvpn-smoke.sh tests/smoke/shell/release-policy-smoke.sh tests/smoke/shell/management-release-smoke.sh tests/smoke/shell/management-upgrade-smoke.sh tests/smoke/shell/management-hook-smoke.sh tests/smoke/shell/network-migration-smoke.sh tests/smoke/shell/render-smoke.sh tests/smoke/shell/runtime-logs-smoke.sh tests/smoke/shell/runtime-events-smoke.sh tests/smoke/shell/schema2-uuid-migration-smoke.sh tests/smoke/container/upgrade-state-smoke.sh tests/smoke/shell/workflow-smoke.sh tests/smoke/shell/license-smoke.sh
      - name: Run shell and control-plane smoke tests
        run: |
          run_smoke() {
            local script="$1"
            printf '::group::%s\n' "$script"
            if "$script"; then
              printf '::endgroup::\n'
            else
              local status=$?
              printf '::error title=Smoke test failed::%s exited with status %s\n' "$script" "$status" >&2
              printf '::endgroup::\n'
              return "$status"
            fi
          }

          for script in \
            tests/smoke/shell/check.sh \
            tests/smoke/shell/cli-smoke.sh \
            tests/smoke/shell/capabilities-smoke.sh \
            tests/smoke/shell/compatibility-contract-smoke.sh \
            tests/smoke/shell/adapter-selection-smoke.sh \
            tests/smoke/shell/render-smoke.sh \
            tests/smoke/shell/ipam-layout-smoke.sh \
            tests/smoke/shell/management-bootstrap-smoke.sh \
            tests/smoke/shell/management-broker-smoke.sh \
            tests/smoke/shell/runtime-logs-smoke.sh \
            tests/smoke/shell/runtime-events-smoke.sh \
            tests/smoke/shell/management-hook-smoke.sh \
            tests/smoke/shell/schema-gate-smoke.sh \
            tests/smoke/shell/migration-isolation-smoke.sh \
            tests/smoke/shell/registry-migration-smoke.sh \
            tests/smoke/shell/schema2-uuid-migration-smoke.sh \
            tests/smoke/shell/uuid-registry-smoke.sh \
            tests/smoke/shell/client-ip-set-smoke.sh \
            tests/smoke/shell/init-start-smoke.sh \
            tests/smoke/shell/bootstrap-init-smoke.sh \
            tests/smoke/shell/state-scanner-smoke.sh \
            tests/smoke/shell/state-machine-smoke.sh \
            tests/smoke/shell/crypto-state-smoke.sh \
            tests/smoke/shell/doctor-smoke.sh \
            tests/smoke/shell/repair-plan-smoke.sh \
            tests/smoke/shell/ipam-repair-smoke.sh \
            tests/smoke/shell/network-migration-smoke.sh \
            tests/smoke/shell/recovery-shared-smoke.sh \
            tests/smoke/shell/client-lifecycle-smoke.sh \
            tests/smoke/shell/maintenance-smoke.sh \
            tests/smoke/shell/maintenance-compose-smoke.sh \
            tests/smoke/shell/network-policy-smoke.sh \
            tests/smoke/shell/source-build-layout-smoke.sh \
            tests/smoke/shell/build-info-smoke.sh \
            tests/smoke/shell/docker-build-wrapper-smoke.sh \
            tests/smoke/shell/update-openvpn-smoke.sh \
            tests/smoke/shell/release-policy-smoke.sh \
            tests/smoke/shell/management-release-smoke.sh \
            tests/smoke/shell/management-upgrade-smoke.sh \
            tests/smoke/shell/data-schema-policy-smoke.sh \
            tests/smoke/shell/workflow-smoke.sh \
            tests/smoke/shell/license-smoke.sh
          do
            run_smoke "$script"
          done

  source-integrity:
    name: G0 source integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fetch and verify pinned OpenVPN source
        run: tests/smoke/shell/source-fetch-smoke.sh

  image:
    name: G1-G11 runtime, PKI, repair, and E2E
    needs:
      - static
      - source-integrity
    runs-on: ubuntu-latest
    env:
      IMAGE: openvpn-ci:${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
      - name: Build pinned runtime image
        run: |
          signing_key="$RUNNER_TEMP/management-e2e-signing-key.pem"
          public_key="$RUNNER_TEMP/management-e2e-signing-public.pem"
          openssl genpkey -algorithm ED25519 -out "$signing_key"
          openssl pkey -in "$signing_key" -pubout -out "$public_key"
          public_key_b64="$(base64 -w 0 "$public_key")"
          scripts/docker-build.sh --build-arg "MANAGEMENT_SIGNING_PUBLIC_KEY_B64=$public_key_b64" -t "$IMAGE" .
          printf 'OVPN_E2E_MANAGEMENT_SIGNING_KEY=%s\n' "$signing_key" >>"$GITHUB_ENV"
      - name: Verify runtime and generated configuration
        run: |
          OVPN_RUNTIME_SKIP_BUILD=1 OVPN_RUNTIME_REQUIRED=1 OVPN_RUNTIME_IMAGE="$IMAGE" tests/smoke/container/runtime-image-smoke.sh
          OVPN_CONFIG_LOAD_SKIP_BUILD=1 OVPN_CONFIG_LOAD_REQUIRED=1 OVPN_CONFIG_LOAD_IMAGE="$IMAGE" tests/smoke/container/config-load-smoke.sh
      - name: Verify repair, recovery, maintenance, and upgrade-state handoff
        run: |
          OVPN_REPAIR_SKIP_BUILD=1 OVPN_REPAIR_REQUIRED=1 OVPN_REPAIR_IMAGE="$IMAGE" tests/smoke/container/repair-container-smoke.sh
          OVPN_RECOVERY_SKIP_BUILD=1 OVPN_RECOVERY_REQUIRED=1 OVPN_RECOVERY_IMAGE="$IMAGE" tests/smoke/container/recovery-container-smoke.sh
          OVPN_LIFECYCLE_SKIP_BUILD=1 OVPN_LIFECYCLE_REQUIRED=1 OVPN_LIFECYCLE_IMAGE="$IMAGE" tests/smoke/container/client-lifecycle-container-smoke.sh
          OVPN_NETWORK_MIGRATION_SKIP_BUILD=1 OVPN_NETWORK_MIGRATION_REQUIRED=1 OVPN_NETWORK_MIGRATION_IMAGE="$IMAGE" tests/smoke/container/network-migration-container-smoke.sh
          OVPN_MAINTENANCE_SKIP_BUILD=1 OVPN_MAINTENANCE_REQUIRED=1 OVPN_MAINTENANCE_IMAGE="$IMAGE" tests/smoke/container/maintenance-container-smoke.sh
          OVPN_SCHEMA_MIGRATION_SKIP_BUILD=1 OVPN_SCHEMA_MIGRATION_REQUIRED=1 OVPN_SCHEMA_MIGRATION_IMAGE="$IMAGE" tests/smoke/container/schema-migration-container-smoke.sh
      - name: Verify UDP and TCP VPN E2E
        run: OVPN_E2E_SKIP_BUILD=1 OVPN_E2E_REQUIRED=1 OVPN_E2E_UPGRADE_REQUIRED=1 OVPN_E2E_IMAGE="$IMAGE" tests/smoke/container/e2e-container-smoke.sh
      - name: Collect runtime metadata
        if: always()
        run: |
          mkdir -p artifacts
          docker run --rm --entrypoint ovpn "$IMAGE" version > artifacts/build-info.json || true
          printf 'commit=%s\nimage=%s\n' "$GITHUB_SHA" "$IMAGE" > artifacts/test-summary.txt
      - name: Upload test metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ github.sha }}
          path: artifacts
          if-no-files-found: warn

  upgrade-state:
    name: G12 previous-commit upgrade state
    needs:
      - static
      - source-integrity
    runs-on: ubuntu-latest
    env:
      SOURCE_IMAGE: openvpn-upgrade-source:${{ github.sha }}
      TARGET_IMAGE: openvpn-upgrade-target:${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Build source image from the parent commit
        run: |
          previous="$RUNNER_TEMP/openvpn-previous"
          mkdir -p "$previous"
          git archive HEAD^ | tar -x -C "$previous"
          "$previous/scripts/docker-build.sh" -t "$SOURCE_IMAGE" "$previous"
      - name: Build target image and verify persisted-state handoff
        run: |
          scripts/docker-build.sh -t "$TARGET_IMAGE" .
          OVPN_UPGRADE_SKIP_BUILD=1 OVPN_UPGRADE_REQUIRED=1 OVPN_UPGRADE_SOURCE_IMAGE="$SOURCE_IMAGE" OVPN_UPGRADE_TARGET_IMAGE="$TARGET_IMAGE" tests/smoke/container/upgrade-state-smoke.sh

  multiarch:
    name: G13 multi-architecture build
    needs:
      - static
      - source-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build amd64 and arm64 OCI image
        run: |
          set -a
          . ./versions.env
          set +a
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "BASE_IMAGE=$BASE_IMAGE" \
            --build-arg "IMAGE_VERSION=$IMAGE_VERSION" \
            --build-arg "MANAGEMENT_VERSION=$MANAGEMENT_VERSION" \
            --build-arg "PLATFORM_API=$PLATFORM_API" \
            --build-arg "DATA_SCHEMA=$DATA_SCHEMA" \
            --build-arg "OPENVPN_VERSION=$OPENVPN_VERSION" \
            --build-arg "OPENVPN_SOURCE_SHA256=$OPENVPN_SOURCE_SHA256" \
            --build-arg "EASYRSA_VERSION=$EASYRSA_VERSION" \
            --build-arg "OPENVPN_SUPPORTED_RANGE=$OPENVPN_SUPPORTED_RANGE" \
            --build-arg "VCS_REF=$GITHUB_SHA" \
            --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output type=oci,dest="$RUNNER_TEMP/openvpn-multiarch.tar" \
            .
          test -s "$RUNNER_TEMP/openvpn-multiarch.tar"
      - name: Upload multi-architecture build record
        uses: actions/upload-artifact@v4
        with:
          name: multiarch-${{ github.sha }}
          path: ${{ runner.temp }}/openvpn-multiarch.tar
