name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOPROXY: direct

jobs:
  go:
    name: Go format, vet, test, race, build, and licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"
      - name: Vet and test
        run: |
          go vet ./...
          go test ./...
          go test -race ./...
      - name: Build runtime binaries
        run: |
          go build -buildvcs=false -trimpath -o "$RUNNER_TEMP/ovpn" ./cmd/ovpn
          go build -buildvcs=false -trimpath -o "$RUNNER_TEMP/ovpn-broker" ./cmd/ovpn-broker
      - name: Verify dependency graph and licenses
        run: scripts/verify-go-licenses.sh

  static:
    name: Delivery tooling and retained black-box contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint workflows and delivery tooling
        run: |
          docker run --rm -v "$PWD:/work:ro" -w /work rhysd/actionlint:1.7.7
          docker run --rm -v "$PWD:/work:ro" -w /work koalaman/shellcheck:v0.10.0 -e SC1091 \
            scripts/docker-build.sh \
            scripts/fetch-openvpn-source.sh \
            scripts/go-tool.sh \
            scripts/release-policy.sh \
            scripts/update-openvpn.sh \
            scripts/verify-go-licenses.sh \
            scripts/verify-go-toolchain.sh \
            tests/smoke/container/go-sqlite-handoff-smoke.sh \
            tests/smoke/container/runtime-image-smoke.sh \
            tests/smoke/shell/check.sh \
            tests/smoke/shell/docker-build-wrapper-smoke.sh \
            tests/smoke/shell/license-smoke.sh \
            tests/smoke/shell/maintenance-compose-smoke.sh \
            tests/smoke/shell/release-policy-smoke.sh \
            tests/smoke/shell/source-build-layout-smoke.sh \
            tests/smoke/shell/source-fetch-smoke.sh \
            tests/smoke/shell/update-openvpn-smoke.sh \
            tests/smoke/shell/workflow-smoke.sh
          docker run --rm -v "$PWD:/work:ro" -w /work mvdan/shfmt:v3.10.0 -i 2 -d \
            scripts/docker-build.sh \
            scripts/fetch-openvpn-source.sh \
            scripts/go-tool.sh \
            scripts/release-policy.sh \
            scripts/update-openvpn.sh \
            scripts/verify-go-licenses.sh \
            scripts/verify-go-toolchain.sh \
            tests/smoke/container/go-sqlite-handoff-smoke.sh \
            tests/smoke/container/runtime-image-smoke.sh \
            tests/smoke/shell/check.sh \
            tests/smoke/shell/docker-build-wrapper-smoke.sh \
            tests/smoke/shell/license-smoke.sh \
            tests/smoke/shell/maintenance-compose-smoke.sh \
            tests/smoke/shell/release-policy-smoke.sh \
            tests/smoke/shell/source-build-layout-smoke.sh \
            tests/smoke/shell/source-fetch-smoke.sh \
            tests/smoke/shell/update-openvpn-smoke.sh \
            tests/smoke/shell/workflow-smoke.sh
      - name: Run retained Shell contracts
        run: |
          tests/smoke/shell/check.sh
          tests/smoke/shell/docker-build-wrapper-smoke.sh
          tests/smoke/shell/license-smoke.sh
          tests/smoke/shell/maintenance-compose-smoke.sh
          tests/smoke/shell/release-policy-smoke.sh
          tests/smoke/shell/source-build-layout-smoke.sh
          tests/smoke/shell/update-openvpn-smoke.sh
          tests/smoke/shell/workflow-smoke.sh

  source-integrity:
    name: Pinned OpenVPN source integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fetch and verify official source
        run: tests/smoke/shell/source-fetch-smoke.sh

  image:
    name: Go runtime image
    needs:
      - go
      - static
      - source-integrity
    runs-on: ubuntu-latest
    env:
      IMAGE: openvpn-ci:${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build pinned runtime image
        run: scripts/docker-build.sh -t "$IMAGE" .
      - name: Verify runtime image
        run: OVPN_RUNTIME_SKIP_BUILD=1 OVPN_RUNTIME_REQUIRED=1 OVPN_RUNTIME_IMAGE="$IMAGE" tests/smoke/container/runtime-image-smoke.sh
      - name: Collect runtime metadata
        if: always()
        run: |
          mkdir -p artifacts
          docker run --rm --entrypoint ovpn "$IMAGE" version --json > artifacts/build-info.json || true
          printf 'commit=%s\nimage=%s\n' "$GITHUB_SHA" "$IMAGE" > artifacts/test-summary.txt
      - name: Upload test metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ github.sha }}
          path: artifacts
          if-no-files-found: warn

  schema3-handoff:
    name: Real schema 3 migration and rollback
    needs:
      - go
      - static
      - source-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Migrate a sh-ver instance and prove rollback
        run: OVPN_GO_HANDOFF_REQUIRED=1 tests/smoke/container/go-sqlite-handoff-smoke.sh

  multiarch:
    name: Multi-architecture OCI build
    needs:
      - go
      - static
      - source-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build amd64 and arm64 OCI image
        run: |
          set -a
          . ./versions.env
          set +a
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "BASE_IMAGE=$BASE_IMAGE" \
            --build-arg "GO_BUILD_IMAGE=$GO_BUILD_IMAGE" \
            --build-arg "GO_RUNTIME_VERSION=$GO_RUNTIME_VERSION" \
            --build-arg "IMAGE_VERSION=$IMAGE_VERSION" \
            --build-arg "DATA_SCHEMA=$DATA_SCHEMA" \
            --build-arg "OPENVPN_VERSION=$OPENVPN_VERSION" \
            --build-arg "OPENVPN_SOURCE_SHA256=$OPENVPN_SOURCE_SHA256" \
            --build-arg "EASYRSA_VERSION=$EASYRSA_VERSION" \
            --build-arg "OPENVPN_CANDIDATE_RANGE=$OPENVPN_CANDIDATE_RANGE" \
            --build-arg "VCS_REF=$GITHUB_SHA" \
            --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output type=oci,dest="$RUNNER_TEMP/openvpn-multiarch.tar" \
            .
          test -s "$RUNNER_TEMP/openvpn-multiarch.tar"
      - name: Upload multi-architecture build record
        uses: actions/upload-artifact@v4
        with:
          name: multiarch-${{ github.sha }}
          path: ${{ runner.temp }}/openvpn-multiarch.tar
