name: Upstream Check

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-check
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Discover and propose the latest official OpenVPN release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          set -a
          . ./versions.env
          set +a
          latest_tag="$(gh api repos/OpenVPN/openvpn/releases/latest --jq .tag_name)"
          target="${latest_tag#v}"
          if ! [[ "$target" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "unexpected official release tag: $latest_tag" >&2
            exit 1
          fi
          if [ "$target" = "$OPENVPN_VERSION" ] || [ "$(printf '%s\n%s\n' "$OPENVPN_VERSION" "$target" | sort -V | tail -n 1)" != "$target" ]; then
            echo "no newer official OpenVPN release than $OPENVPN_VERSION"
            exit 0
          fi
          branch="automation/openvpn-$target"
          if [ "$(gh pr list --head "$branch" --state open --json url --jq length)" -gt 0 ]; then
            echo "open update pull request already exists for $target"
            exit 0
          fi
          archive="$(mktemp)"
          trap 'rm -f "$archive"' EXIT
          curl --fail --location --silent --show-error \
            --output "$archive" \
            "https://github.com/OpenVPN/openvpn/releases/download/v$target/openvpn-$target.tar.gz"
          source_sha256="$(sha256sum "$archive" | awk '{print $1}')"
          scripts/update-openvpn.sh "$target" "$source_sha256"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b "$branch"
          git add versions.env
          git commit -m "build: update OpenVPN to $target"
          git push origin "$branch"
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch" \
            --title "build: update OpenVPN to $target" \
            --body "Updates versions.env with the official OpenVPN $target release and its SHA-256. Candidate and compatibility workflows must pass before promotion."
