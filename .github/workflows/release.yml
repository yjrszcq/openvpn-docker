name: Image Release

on:
  workflow_run:
    workflows:
      - Candidate
    types:
      - completed

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: szcq
  DOCKERHUB_IMAGE: openvpn
concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  policy:
    name: Evaluate stable release policy
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch
    runs-on: ubuntu-latest
    outputs:
      same_branch: ${{ steps.policy.outputs.same_branch }}
      in_range: ${{ steps.policy.outputs.in_range }}
      release_eligible: ${{ steps.policy.outputs.release_eligible }}
      decision: ${{ steps.policy.outputs.decision }}
      image_required: ${{ steps.policy.outputs.image_required }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - id: policy
        name: Classify candidate promotion
        run: |
          set -a
          . ./versions.env
          set +a
          scripts/verify-release-metadata.sh > release-metadata.env
          cat release-metadata.env >> "$GITHUB_STEP_SUMMARY"
          previous="$(git show HEAD^:versions.env 2>/dev/null | awk -F= '$1 == "OPENVPN_VERSION" {print $2}' || true)"
          [ -n "$previous" ] || previous="$OPENVPN_VERSION"
          previous_image="$(git show HEAD^:versions.env 2>/dev/null | awk -F= '$1 == "IMAGE_VERSION" {print $2}' || true)"
          if [ "${{ github.event.workflow_run.event }}" != workflow_dispatch ] && [ -n "$previous_image" ] && [ "$previous_image" = "$IMAGE_VERSION" ]; then
            echo 'image_required=false' >> "$GITHUB_OUTPUT"
          else
            echo 'image_required=true' >> "$GITHUB_OUTPUT"
          fi
          scripts/release-policy.sh \
            --previous-version "$previous" \
            --target-version "$OPENVPN_VERSION" \
            --candidate-range "$OPENVPN_CANDIDATE_RANGE" \
            --image-version "$IMAGE_VERSION" \
            --github-output "$GITHUB_OUTPUT" > release-policy.env
          cat release-policy.env >> "$GITHUB_STEP_SUMMARY"

  blocked:
    name: Record blocked stable promotion
    needs: policy
    if: >-
      needs.policy.outputs.decision == 'RANGE_BLOCKED' ||
      needs.policy.outputs.decision == 'IMAGE_VERSION_BLOCKED'
    runs-on: ubuntu-latest
    steps:
      - run: |
          {
            echo "## Stable promotion blocked"
            echo "decision=${{ needs.policy.outputs.decision }}"
            echo 'The candidate remains available; stable tags were not created.'
          } >> "$GITHUB_STEP_SUMMARY"

  publish-same-branch:
    name: Promote same-branch candidate to stable
    needs: policy
    if: >-
      needs.policy.outputs.image_required == 'true' &&
      needs.policy.outputs.decision == 'READY_SAME_BRANCH'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/setup-buildx-action@v3
      - name: Authenticate to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Promote tested candidate and write release notes
        run: |
          set -a
          . ./versions.env
          set +a
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          IFS=. read -r image_major image_minor _ <<<"$IMAGE_VERSION"
          docker buildx imagetools create \
            --tag "$image:$IMAGE_VERSION" \
            --tag "$image:$image_major.$image_minor" \
            --tag "$image:$image_major" \
            --tag "$image:latest" \
            --tag "$image:ovpn$OPENVPN_VERSION" \
            "$image:candidate-$IMAGE_VERSION"
          {
            echo '## Stable release'
            echo "- Image version: $IMAGE_VERSION"
            echo "- OpenVPN version: $OPENVPN_VERSION"
            echo "- Easy-RSA version: $EASYRSA_VERSION"
            echo "- Go runtime version: $GO_RUNTIME_VERSION"
            echo "- Candidate range: $OPENVPN_CANDIDATE_RANGE"
            echo "- Schema version: $DATA_SCHEMA"
            echo '- SQLite driver: github.com/mattn/go-sqlite3 v1.14.48 (MIT)'
            echo '- YAML library: go.yaml.in/yaml/v3 v3.0.4 (MIT and Apache-2.0)'
            echo '- Branch transition: same branch'
            echo '- Approval: not required'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Authenticate to Docker Hub
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: printf '%s' "$DOCKER_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - name: Publish OpenVPN version tag to Docker Hub
        run: |
          set -a
          . ./versions.env
          set +a
          source_image="ghcr.io/${GITHUB_REPOSITORY,,}:ovpn$OPENVPN_VERSION"
          target_image="$DOCKERHUB_USERNAME/$DOCKERHUB_IMAGE:$OPENVPN_VERSION"
          docker buildx imagetools create --tag "$target_image" "$source_image"

  publish-cross-branch:
    name: Promote cross-branch candidate after approval
    needs: policy
    if: >-
      needs.policy.outputs.image_required == 'true' &&
      needs.policy.outputs.decision == 'WAITING_CROSS_BRANCH_APPROVAL'
    runs-on: ubuntu-latest
    environment:
      name: stable-cross-branch
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/setup-buildx-action@v3
      - name: Authenticate to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Promote approved candidate and write release notes
        run: |
          set -a
          . ./versions.env
          set +a
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          IFS=. read -r image_major image_minor _ <<<"$IMAGE_VERSION"
          docker buildx imagetools create \
            --tag "$image:$IMAGE_VERSION" \
            --tag "$image:$image_major.$image_minor" \
            --tag "$image:$image_major" \
            --tag "$image:latest" \
            --tag "$image:ovpn$OPENVPN_VERSION" \
            "$image:candidate-$IMAGE_VERSION"
          {
            echo '## Stable release'
            echo "- Image version: $IMAGE_VERSION"
            echo "- OpenVPN version: $OPENVPN_VERSION"
            echo "- Easy-RSA version: $EASYRSA_VERSION"
            echo "- Go runtime version: $GO_RUNTIME_VERSION"
            echo "- Candidate range: $OPENVPN_CANDIDATE_RANGE"
            echo "- Schema version: $DATA_SCHEMA"
            echo '- SQLite driver: github.com/mattn/go-sqlite3 v1.14.48 (MIT)'
            echo '- YAML library: go.yaml.in/yaml/v3 v3.0.4 (MIT and Apache-2.0)'
            echo '- Branch transition: cross branch'
            echo '- Approval: stable-cross-branch Environment approved'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Authenticate to Docker Hub
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: printf '%s' "$DOCKER_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - name: Publish OpenVPN version tag to Docker Hub
        run: |
          set -a
          . ./versions.env
          set +a
          source_image="ghcr.io/${GITHUB_REPOSITORY,,}:ovpn$OPENVPN_VERSION"
          target_image="$DOCKERHUB_USERNAME/$DOCKERHUB_IMAGE:$OPENVPN_VERSION"
          docker buildx imagetools create --tag "$target_image" "$source_image"
