name: Documentation

on:
  pull_request:
    paths:
      - README.md
      - README_CN.md
      - docs/**
      - scripts/check-docs.sh
      - .github/workflows/docs.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - README_CN.md
      - docs/**
      - scripts/check-docs.sh
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Links and retired interfaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: scripts/check-docs.sh
