x-openvpn-data: &openvpn-data
  volumes:
    - ./openvpn-data:/etc/openvpn
    - ./openvpn-runtime:/var/lib/openvpn

services:
  openvpn:
    image: ${OVPN_IMAGE:-szcq/openvpn:2.7.5}
    container_name: openvpn
    restart: unless-stopped
    network_mode: host

    <<: *openvpn-data

    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun:/dev/net/tun

    environment:
      OVPN_ENDPOINT: ${OVPN_ENDPOINT:-vpn.example.com}
      OVPN_PROTO: ${OVPN_PROTO:-udp}
      OVPN_PORT: ${OVPN_PORT:-1194}
      OVPN_NETWORK: ${OVPN_NETWORK:-10.8.0.0/24}
      OVPN_TOPOLOGY: ${OVPN_TOPOLOGY:-subnet}
      OVPN_DYNAMIC_POOL_SIZE: ${OVPN_DYNAMIC_POOL_SIZE:-64}
      OVPN_NAT: ${OVPN_NAT:-false}
      OVPN_NAT_INTERFACE: ${OVPN_NAT_INTERFACE:-auto}
      OVPN_REDIRECT_GATEWAY: ${OVPN_REDIRECT_GATEWAY:-false}
      OVPN_CLIENT_TO_CLIENT: ${OVPN_CLIENT_TO_CLIENT:-true}
      OVPN_DNS: ${OVPN_DNS:-}
      OVPN_ROUTES: ${OVPN_ROUTES:-}
      OVPN_CRITICAL_MODE: ${OVPN_CRITICAL_MODE:-exit}

  openvpn-maintenance:
    image: ${OVPN_IMAGE:-szcq/openvpn:2.7.5}
    restart: "no"

    <<: *openvpn-data

    profiles:
      - maintenance

    command:
      - doctor
    entrypoint:
      - /usr/local/bin/ovpn
